<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор имен</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #333; font-size: 1.5rem; }
        #result {
            font-size: 2rem;
            font-weight: bold;
            margin: 1.5rem 0;
            color: #4a90e2;
            min-height: 3rem;
        }
        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #357abd; }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .status { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Генератор имен</h1>
        <div id="result">Загрузка...</div>
        <button id="genBtn" disabled>Подождите...</button>
        <div id="status" class="status">Подключаемся к базе данных...</div>
    </div>

    <script>
        // Преобразованная прямая ссылка на ваш файл
        const FILE_URL = 'https://google.com';

        let words = [];

        async function loadFile() {
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('genBtn');
            const statusDiv = document.getElementById('status');

            try {
                const response = await fetch(FILE_URL);
                if (!response.ok) throw new Error('Доступ запрещен или файл не найден');
                
                const text = await response.text();
                
                // Разбиваем текст на строки и убираем пустые
                words = text.split(/\r?\n/).map(w => w.trim()).filter(w => w.length > 0);

                if (words.length > 0) {
                    resultDiv.innerText = 'Готово!';
                    btn.innerText = 'Сгенерировать';
                    btn.disabled = false;
                    statusDiv.innerText = `В базе ${words.length} слов`;
                } else {
                    throw new Error('Файл пуст');
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerText = 'Ошибка';
                resultDiv.style.color = 'red';
                statusDiv.innerText = 'Проверьте доступ по ссылке в Google Drive';
            }
        }

        function generate() {
            const randomIndex = Math.floor(Math.random() * words.length);
            const randomWord = words[randomIndex];
            document.getElementById('result').innerText = randomWord;
        }

        document.getElementById('genBtn').addEventListener('click', generate);

        // Запуск загрузки
        loadFile();
    </script>
</body>
</html>
