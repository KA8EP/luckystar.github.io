<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Имен Pro</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #4ade80; /* Зеленый акцент, как в генераторах */
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid #333;
        }

        h1 { font-size: 1.2rem; color: #888; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        #result-box {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #444;
            color: var(--accent);
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }

        button {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        .nav-link {
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .nav-link:hover { color: var(--accent); }

        .error-msg { color: #ff5555; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Генератор Имен</h1>
        
        <div id="result-box">Загрузка...</div>

        <div class="controls">
            <button id="genBtn" disabled>Загрузка базы...</button>
            <!-- Кнопка перехода на другую страницу -->
            <a href="page2.html" class="nav-link">Перейти на другую страницу →</a>
        </div>

        <div id="error" class="error-msg">Ошибка доступа к файлу. Проверьте ссылку.</div>
    </div>

    <script>
        // Исправленная ссылка для прямого скачивания
        const FILE_ID = '1iifY9xQvHpvthWBtHYWu_28o7WgR6kQd';
        const FILE_URL = `https://google.com{FILE_ID}`;

        let words = [];

        async function init() {
            const btn = document.getElementById('genBtn');
            const res = document.getElementById('result-box');
            
            try {
                // Пытаемся получить данные
                const response = await fetch(FILE_URL);
                if (!response.ok) throw new Error('CORS or Access error');
                
                const text = await response.text();
                words = text.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);

                res.innerText = 'Готово к работе';
                btn.innerText = 'СГЕНЕРИРОВАТЬ';
                btn.disabled = false;
            } catch (e) {
                console.error(e);
                res.innerText = 'Ошибка';
                document.getElementById('error').style.display = 'block';
                // Если Google блокирует fetch, попробуйте открыть страницу через расширение "Allow CORS" в браузере
            }
        }

        function generate() {
            const word = words[Math.floor(Math.random() * words.length)];
            document.getElementById('result-box').innerText = word;
        }

        document.getElementById('genBtn').addEventListener('click', generate);
        init();
    </script>

</body>
</html>
