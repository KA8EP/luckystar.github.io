<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор имен</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #00cfb4;
            --text: #ffffff;
            --text-dim: #b0b0b0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        nav { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        nav a { color: var(--accent); text-decoration: none; margin: 0 10px; font-weight: bold; }
        nav span { color: var(--text-dim); margin: 0 10px; }
        
        .result-container { position: relative; margin-bottom: 20px; }
        .result-box {
            background: #2a2a2a;
            padding: 15px 50px 15px 15px;
            border-radius: 8px;
            font-size: 1.5rem;
            word-break: break-word;
            min-height: 36px;
            border: 1px solid #333;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .info { text-align: left; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px; }
        
        .main-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .main-btn:hover { opacity: 0.8; }
        .main-btn:disabled { background: #444; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html">Пароли</a> | <span>Имена</span>
        </nav>
        <h2>Генератор имён</h2>
        
        <div class="result-container">
            <div class="result-box" id="nameResult">Загрузка...</div>
            <button class="copy-btn" onclick="copyText('nameResult')">COPY</button>
        </div>
        
        <div class="info" id="statusText">Подключение к базе данных...</div>

        <button class="main-btn" id="genBtn" onclick="generateName()" disabled>Создать имя</button>
    </div>

    <script>
        const FILE_ID = '1iifY9xQvHpvthWBtHYWu_28o7WgR6kQd';
        const FILE_URL = `https://google.com{FILE_ID}`;
        let nameDatabase = [];

        async function init() {
            try {
                const response = await fetch(FILE_URL);
                if (!response.ok) throw new Error();
                const data = await response.text();
                nameDatabase = data.split(/\r?\n/).map(n => n.trim()).filter(n => n.length > 0);
                document.getElementById('statusText').innerText = `Готово. В базе ${nameDatabase.length} имён`;
            } catch (e) {
                nameDatabase = ["Александр", "Дмитрий", "Иван", "Максим"];
                document.getElementById('statusText').innerText = "Локальный режим (ошибка облака)";
            }
            document.getElementById('nameResult').innerText = "Готов";
            document.getElementById('genBtn').disabled = false;
        }

        function generateName() {
            const name = nameDatabase[Math.floor(Math.random() * nameDatabase.length)];
            document.getElementById('nameResult').innerText = name;
        }

        async function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            if (text === "Загрузка..." || text === "Готов") return;
            await navigator.clipboard.writeText(text);
            alert("Имя скопировано!");
        }

        init();
    </script>
</body>
</html>
