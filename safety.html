<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор имен</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #00cfb4; /* Тот же бирюзовый цвет */
            --text: #ffffff;
            --text-dim: #b0b0b0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        nav { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        nav a { color: var(--accent); text-decoration: none; margin: 0 10px; font-weight: bold; }
        nav span { color: var(--text-dim); margin: 0 10px; }
        
        .result-box {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.5rem;
            margin-bottom: 20px;
            word-break: break-word;
            min-height: 36px;
            border: 1px solid #333;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .info {
            text-align: left;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #ff4b2b;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background-color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <!-- Ссылки для перехода между страницами -->
            <a href="index.html">Пароли</a> | <span>Имена</span>
        </nav>
        
        <h2>Генератор имён</h2>
        
        <div class="result-box" id="nameResult">Загрузка базы...</div>
        
        <div class="info">
            <span id="statusDot" class="status-dot"></span>
            <span id="statusText">Подключение к облаку...</span>
        </div>

        <button id="genBtn" onclick="generateName()" disabled>Создать имя</button>
    </div>

    <script>
        // Твоя ссылка на файл
        const FILE_ID = '1iifY9xQvHpvthWBtHYWu_28o7WgR6kQd';
        const FILE_URL = `https://google.com{FILE_ID}`;
        
        let nameDatabase = [];

        async function init() {
            const resultBox = document.getElementById('nameResult');
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');
            const btn = document.getElementById('genBtn');

            try {
                // Попытка загрузить файл
                const response = await fetch(FILE_URL);
                if (!response.ok) throw new Error("CORS/Access Error");
                
                const data = await response.text();
                nameDatabase = data.split(/\r?\n/).map(n => n.trim()).filter(n => n.length > 0);
                
                finishLoading(`База загружена: ${nameDatabase.length} имён`);
            } catch (error) {
                console.log("Облако недоступно, используем локальный список");
                // Запасной список на случай ошибки Google Drive
                nameDatabase = ["Александр", "Дмитрий", "Максим", "Артем", "Иван", "Кирилл", "Михаил"];
                finishLoading("Локальный режим (ошибка облака)");
            }
        }

        function finishLoading(message) {
            document.getElementById('statusText').innerText = message;
            document.getElementById('statusDot').classList.add('online');
            document.getElementById('nameResult').innerText = "Готов к работе";
            document.getElementById('genBtn').disabled = false;
        }

        function generateName() {
            if (nameDatabase.length === 0) return;
            const randomIndex = Math.floor(Math.random() * nameDatabase.length);
            document.getElementById('nameResult').innerText = nameDatabase[randomIndex];
        }

        // Запуск при загрузке
        init();
    </script>
</body>
</html>
