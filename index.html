<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #00cfb4;
            --text: #ffffff;
            --text-dim: #b0b0b0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        nav { margin-bottom: 20px; }
        nav a { color: var(--accent); text-decoration: none; margin: 0 10px; font-weight: bold; }
        .result-box {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            word-break: break-all;
            min-height: 28px;
            border: 1px solid #333;
        }
        .settings { text-align: left; margin-bottom: 20px; }
        .setting-item { margin: 10px 0; display: flex; justify-content: space-between; }
        input[type="number"] { width: 50px; background: #333; border: none; color: white; padding: 5px; border-radius: 4px; }
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <span>Пароли</span> | <a href="safety.html">Имена</a>
        </nav>
        <h2>Генератор паролей</h2>
        <div class="result-box" id="passwordResult">Нажмите «Создать»</div>
        
        <div class="settings">
            <div class="setting-item">
                <span>Длина (8-50):</span>
                <input type="number" id="length" value="12" min="8" max="50">
            </div>
            <div class="setting-item">
                <span>Заглавные буквы (A-Z):</span>
                <input type="checkbox" id="upper" checked>
            </div>
            <div class="setting-item">
                <span>Числа (0-9):</span>
                <input type="checkbox" id="numbers" checked>
            </div>
            <div class="setting-item">
                <span>Спецсимволы (!@#$):</span>
                <input type="checkbox" id="symbols">
            </div>
        </div>
        <button onclick="generatePassword()">Создать пароль</button>
    </div>

    <script>
        function generatePassword() {
            const length = document.getElementById('length').value;
            const hasUpper = document.getElementById('upper').checked;
            const hasNumbers = document.getElementById('numbers').checked;
            const hasSymbols = document.getElementById('symbols').checked;
            
            const lower = "abcdefghijklmnopqrstuvwxyz";
            const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const numbers = "0123456789";
            const symbols = "!@#$%^&*()_+~`|}{[]:;?><,./-=";
            
            let charSet = lower;
            if (hasUpper) charSet += upper;
            if (hasNumbers) charSet += numbers;
            if (hasSymbols) charSet += symbols;
            
            let password = "";
            for (let i = 0; i < length; i++) {
                password += charSet.charAt(Math.floor(Math.random() * charSet.length));
            }
            document.getElementById('passwordResult').innerText = password;
        }
    </script>
</body>
</html>
